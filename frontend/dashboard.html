<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - FiscalFlow</title>
  <link rel="stylesheet" href="style.css">
  <script src="js/theme.js"></script>
</head>

<body>

  <div class="dashboard-layout" id="app-layout">

    <!-- QUICK ACTIONS -->
    <div class="flex gap-4 mb-6">
      <button class="btn btn-primary flex-1" onclick="window.location.href='transactions.html'">+ Add
        Transaction</button>
      <button class="btn btn-success flex-1" onclick="window.location.href='savings.html'">+ Savings Goal</button>
    </div>

    <!-- SUMMARY CARDS -->
    <div class="stats-grid">
      <div class="card stat-card balance glass">
        <div>
          <h3 class="text-sm text-secondary font-medium m-0">Remaining Balance</h3>
          <p class="stat-value" id="savings">₹0</p>
        </div>
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="5" width="20" height="14" rx="2" ry="2"></rect>
            <line x1="2" y1="10" x2="22" y2="10"></line>
          </svg>
        </div>
      </div>

      <div class="card stat-card income glass">
        <div>
          <h3 class="text-sm text-secondary font-medium m-0">Total Income</h3>
          <p class="stat-value" id="totalIncome">₹0</p>
        </div>
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
            <polyline points="17 6 23 6 23 12"></polyline>
          </svg>
        </div>
      </div>

      <div class="card stat-card expense glass">
        <div>
          <h3 class="text-sm text-secondary font-medium m-0">Total Expense</h3>
          <p class="stat-value" id="totalExpense">₹0</p>
        </div>
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline>
            <polyline points="17 18 23 18 23 12"></polyline>
          </svg>
        </div>
      </div>
    </div>

    <!-- MONTHLY REPORT -->
    <div class="card glass">
      <div class="card-header border-b-0 pb-0 mb-4">
        <h3 class="card-title">Monthly Report</h3>
      </div>

      <div class="flex flex-col sm:flex-row gap-4 items-end mb-6">
        <div class="input-group mb-0 flex-1">
          <label class="input-label" for="month">Month</label>
          <select class="input-field" id="month">
            <option value="01">January (01)</option>
            <option value="02" selected>February (02)</option>
            <option value="03">March (03)</option>
            <option value="04">April (04)</option>
            <option value="05">May (05)</option>
            <option value="06">June (06)</option>
            <option value="07">July (07)</option>
            <option value="08">August (08)</option>
            <option value="09">September (09)</option>
            <option value="10">October (10)</option>
            <option value="11">November (11)</option>
            <option value="12">December (12)</option>
          </select>
        </div>
        <div class="input-group mb-0 flex-1">
          <label class="input-label" for="year">Year</label>
          <input class="input-field" id="year" type="number" placeholder="YYYY (eg. 2026)" value="2026">
        </div>
        <button class="btn btn-primary" onclick="loadMonthly()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Generate
        </button>
      </div>

      <div class="p-4 bg-bg-tertiary rounded-md border border-border-color">
        <p class="m-0 text-text-primary" id="monthly" style="white-space: pre-wrap;">Select a month and year to view the
          report.</p>
      </div>
    </div>

    <!-- ADVANCED INSIGHTS -->
    <div class="card glass mt-6" id="insightsCard" style="display: none;">
      <div class="card-header border-b border-border-color pb-4 mb-4">
        <h3 class="card-title">Spending Insights</h3>
        <span class="text-sm text-secondary" id="insightsMonth">This Month</span>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <h4 class="text-sm font-semibold text-secondary uppercase tracking-wider mb-4">Key Metrics</h4>
          <div class="space-y-4">
            <div class="flex justify-between items-center p-3 bg-bg-tertiary rounded border border-border-color">
              <span class="text-text-primary">Savings Rate</span>
              <span class="font-bold text-accent-primary" id="savingsRate">0%</span>
            </div>
            <div class="flex justify-between items-center p-3 bg-bg-tertiary rounded border border-border-color">
              <span class="text-text-primary">Average Daily Spend</span>
              <span class="font-bold text-danger" id="avgDailySpend">0</span>
            </div>
            <div class="flex justify-between items-center p-3 bg-bg-tertiary rounded border border-border-color">
              <span class="text-text-primary">Highest Category</span>
              <span class="font-bold text-warning" id="highestCategorySpend">None</span>
            </div>
          </div>
        </div>

        <div>
          <h4 class="text-sm font-semibold text-secondary uppercase tracking-wider mb-4">Top Categories</h4>
          <div id="topCategoriesList" class="space-y-3">
            <p class="text-muted text-sm my-2">No category data available.</p>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Scripts -->
  <script src="js/api.js"></script>

  <script>
    // 🔐 Auth guard early check
    const params = new URLSearchParams(window.location.search);
    const tokenFromGoogle = params.get("token");

    if (tokenFromGoogle) {
      localStorage.setItem("token", tokenFromGoogle);
      window.history.replaceState({}, document.title, "/dashboard.html");
    }

    if (!localStorage.getItem("token")) {
      window.location.href = "/";
    }
  </script>

  <script src="js/dashboard.js"></script>
  <script src="js/components/Layout.js"></script>
  <script>
    // Initialize layout wrapper
    Layout.init('dashboard', 'Overview');
  </script>

</body>

</html>
