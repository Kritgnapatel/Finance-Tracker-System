<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Insights - FiscalFlow</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/theme.js"></script>
</head>

<body>

    <div class="dashboard-layout" id="app-layout">

        <div class="flex flex-col gap-6">

            <!-- CONTROLS -->
            <div class="card glass">
                <div class="flex flex-col sm:flex-row gap-4 items-end">
                    <div class="input-group mb-0 flex-1">
                        <label class="input-label" for="insightMonth">Target Month</label>
                        <select class="input-field" id="insightMonth">
                            <option value="01">January</option>
                            <option value="02" selected>February</option>
                            <option value="03">March</option>
                            <option value="04">April</option>
                            <option value="05">May</option>
                            <option value="06">June</option>
                            <option value="07">July</option>
                            <option value="08">August</option>
                            <option value="09">September</option>
                            <option value="10">October</option>
                            <option value="11">November</option>
                            <option value="12">December</option>
                        </select>
                    </div>
                    <div class="input-group mb-0 flex-1">
                        <label class="input-label" for="insightYear">Analytics Year</label>
                        <input class="input-field" id="insightYear" type="number" placeholder="YYYY" value="2026">
                    </div>
                    <button class="btn btn-primary" onclick="generateInsights()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Analyze Data
                    </button>
                </div>
            </div>

            <div id="loadingInsights" class="text-center py-8" style="display: none;">
                <span class="loader"
                    style="width: 2rem; height: 2rem; border-color: var(--accent-primary); border-bottom-color: transparent;"></span>
                <p class="text-muted mt-2">Crunching the numbers...</p>
            </div>

            <div id="insightsContent" style="display: none;" class="flex flex-col gap-6">
                <!-- KEY METRICS -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div class="p-5 bg-bg-secondary rounded-xl border border-border-color shadow-sm">
                        <div class="text-xs text-secondary uppercase tracking-wider font-semibold mb-2">Net Balance
                        </div>
                        <div class="text-2xl font-bold" id="iBalance" style="color: var(--text-primary)">$0</div>
                    </div>
                    <div class="p-5 bg-bg-secondary rounded-xl border border-border-color shadow-sm">
                        <div class="text-xs text-secondary uppercase tracking-wider font-semibold mb-2">Savings Rate
                        </div>
                        <div class="text-2xl font-bold text-accent-primary" id="iSavingsRate">0%</div>
                    </div>
                    <div class="p-5 bg-bg-secondary rounded-xl border border-border-color shadow-sm">
                        <div class="text-xs text-secondary uppercase tracking-wider font-semibold mb-2">Avg Daily Spend
                        </div>
                        <div class="text-2xl font-bold text-danger" id="iAvgDailySpend">$0</div>
                    </div>
                    <div class="p-5 bg-bg-secondary rounded-xl border border-border-color shadow-sm">
                        <div class="text-xs text-secondary uppercase tracking-wider font-semibold mb-2">Highest Category
                        </div>
                        <div class="text-2xl font-bold text-warning capitalize truncate" id="iHighestCat">None</div>
                    </div>
                </div>

                <!-- CHARTS / VISUALS -->
                <div class="flex flex-col lg:flex-row gap-6">
                    <div class="card glass" style="flex: 2;">
                        <h3 class="card-title mb-6">Income vs Expense Ratio</h3>
                        <div
                            class="relative w-full h-8 bg-danger-bg rounded-full overflow-hidden border border-border-color">
                            <div id="iRatioBar"
                                class="absolute top-0 left-0 h-full bg-success transition-all duration-1000 ease-out"
                                style="width: 50%;"></div>
                        </div>
                        <div class="flex justify-between mt-3 text-sm font-medium">
                            <span class="text-success" id="iIncomeRatioTxt">Income: $0 (50%)</span>
                            <span class="text-danger" id="iExpenseRatioTxt">Expense: $0 (50%)</span>
                        </div>
                    </div>

                    <div class="card glass" style="flex: 3;">
                        <h3 class="card-title mb-6">Spending Patterns (Top Categories)</h3>
                        <div id="iCategoriesList" class="space-y-4">
                            <!-- Injected via JS -->
                        </div>
                    </div>
                </div>

                <!-- SUMMARY BLURB -->
                <div class="card glass bg-accent-glow" style="border-color: rgba(59, 130, 246, 0.3);">
                    <div class="flex gap-4 items-start">
                        <div class="p-3 bg-accent-primary rounded-full text-white">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="16" x2="12" y2="12"></line>
                                <line x1="12" y1="8" x2="12.01" y2="8"></line>
                            </svg>
                        </div>
                        <div>
                            <h4 class="font-bold text-lg mb-1" style="color: var(--accent-primary)">Financial Summary
                            </h4>
                            <p id="iSummaryBlurb" class="text-text-primary mb-0 leading-relaxed"></p>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <script src="js/api.js"></script>
    <script src="js/insights.js"></script>
    <script src="js/components/Layout.js"></script>
    <script>
        if (!localStorage.getItem("token")) window.location.href = "/";
        Layout.init('insights', 'Smart Insights');
    </script>

</body>

</html>
