<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - FiscalFlow</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="dashboard-layout" id="app-layout">

    <div class="flex flex-col lg:flex-row gap-6">

      <!-- USER INFO -->
      <div class="card glass" style="flex: 1; height: fit-content;">
        <div class="card-header border-b-0 pb-0 mb-6">
          <h3 class="card-title text-xl">User Details</h3>
        </div>

        <div class="flex flex-col items-center mb-6">
          <div class="user-avatar"
            style="width: 80px; height: 80px; font-size: 2rem; margin-bottom: 1rem; background-color: var(--accent-primary); color: white; border: none; box-shadow: var(--shadow-glow);"
            id="profileAvatar">U</div>
          <h4 class="text-xl font-bold m-0" id="profileNameDisplay">User</h4>
        </div>

        <div class="p-4 bg-bg-tertiary rounded-md border border-border-color space-y-3">
          <div class="flex justify-between items-center border-b border-border-color pb-3">
            <span class="text-secondary text-sm font-medium">Full Name</span>
            <span class="font-medium" id="profileName">—</span>
          </div>
          <div class="flex justify-between items-center pt-3">
            <span class="text-secondary text-sm font-medium">Email Address</span>
            <span class="font-medium" id="profileEmail">—</span>
          </div>
        </div>
      </div>

      <!-- CURRENCY -->
      <div class="card glass" style="flex: 1; height: fit-content;">
        <div class="card-header border-b-0 pb-0 mb-6">
          <h3 class="card-title text-xl">Preferences</h3>
        </div>

        <p class="text-secondary text-sm mb-6">Choose your preferred currency for the dashboard display.</p>

        <div class="input-group">
          <label class="input-label" for="currencySelect">Default Currency</label>
          <select class="input-field" id="currencySelect">
            <option value="INR">₹ INR - Indian Rupee</option>
            <option value="USD">$ USD - US Dollar</option>
            <option value="EUR">€ EUR - Euro</option>
          </select>
        </div>

        <button class="btn btn-primary mt-4" onclick="updateCurrency()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
            <polyline points="17 21 17 13 7 13 7 21"></polyline>
            <polyline points="7 3 7 8 15 8"></polyline>
          </svg>
          Save Preferences
        </button>
      </div>

    </div>

  </div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/components/Layout.js"></script>
  <script>
    Layout.init('profile', 'Account Settings');

    // Quick fix: profile.js populates elements, we'll sync our new duplicate avatar display
    setTimeout(() => {
      const name = document.getElementById('profileName').innerText;
      if (name && name !== '—') {
        document.getElementById('profileNameDisplay').innerText = name;
        document.getElementById('profileAvatar').innerText = name[0].toUpperCase();
      }
    }, 1000);
  </script>

</body>

</html>
