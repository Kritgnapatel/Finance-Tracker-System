<!DOCTYPE html>
<html>
<head>
  <title>Budgets</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h2>📊 Budgets</h2>

  <div class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="transactions.html">Transactions</a>
    <a href="profile.html">Profile</a>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <h3>Set Monthly Budget</h3>

    <select id="budgetCategory"></select>

    <input
      type="number"
      id="budgetLimit"
      placeholder="Limit Amount"
    />

    <input
      type="text"
      id="budgetMonth"
      placeholder="MM"
    />

    <input
      type="text"
      id="budgetYear"
      placeholder="YYYY"
    />

    <button onclick="setBudget()">Save Budget</button>
  </div>

  <div class="card muted">
    <strong>How it works</strong><br/>
    You will receive an email alert when expenses exceed this limit.
  </div>

</div>

<script src="js/api.js"></script>
<script src="js/budgets.js"></script>
</body>
</html>
