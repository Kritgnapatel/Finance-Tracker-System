<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>FiscalFlow - Secure Finance Tracker</title>
  <link rel="stylesheet" href="style.css">
  <script src="js/theme.js"></script>
</head>

<body>

  <div class="auth-page">
    <div class="card auth-container" id="loginForm">
      <div class="auth-logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
          <path d="M2 17l10 5 10-5"></path>
          <path d="M2 12l10 5 10-5"></path>
        </svg>
      </div>
      <h2 class="text-center text-2xl mb-2 font-bold tracking-tight">Welcome back</h2>
      <p class="text-center text-secondary mb-8 text-sm">Enter your credentials to access your dashboard</p>

      <div class="input-group">
        <label class="input-label" for="loginEmail">Email address</label>
        <input class="input-field" id="loginEmail" type="email" placeholder="name@example.com">
      </div>

      <div class="input-group">
        <label class="input-label" for="loginPassword">Password</label>
        <input class="input-field" id="loginPassword" type="password" placeholder="••••••••">
      </div>

      <button class="btn btn-primary w-full mt-2" onclick="login()" style="height: 2.75rem; font-size: 0.9375rem;">
        <span id="loginText">Sign In</span>
        <span id="loginLoader" class="loader" style="display: none; width: 1.25rem; height: 1.25rem;"></span>
      </button>

      <div class="flex items-center gap-3 my-6">
        <hr class="flex-1 m-0">
        <span class="text-xs text-muted font-medium uppercase tracking-wider">or continue with</span>
        <hr class="flex-1 m-0">
      </div>

      <button class="btn btn-google w-full" onclick="googleLogin()" style="height: 2.75rem;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4" />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853" />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            fill="#FBBC05" />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335" />
        </svg>
        Google
      </button>

      <div class="auth-toggle mt-6">
        Don't have an account? <a onclick="toggleForms()"
          class="text-primary hover:text-accent-primary transition-colors">Create one</a>
      </div>
    </div>

    <div class="card auth-container" id="registerForm" style="display: none;">
      <div class="auth-logo"
        style="background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 10px 20px -10px rgba(16, 185, 129, 0.5);">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="8.5" cy="7" r="4"></circle>
          <line x1="20" y1="8" x2="20" y2="14"></line>
          <line x1="23" y1="11" x2="17" y2="11"></line>
        </svg>
      </div>
      <h2 class="text-center text-2xl mb-2 font-bold tracking-tight">Create an account</h2>
      <p class="text-center text-secondary mb-8 text-sm">Start tracking your finances like a pro</p>

      <div class="input-group">
        <label class="input-label" for="registerName">Full Name</label>
        <input class="input-field" id="registerName" type="text" placeholder="John Doe">
      </div>

      <div class="input-group">
        <label class="input-label" for="registerEmail">Email address</label>
        <input class="input-field" id="registerEmail" type="email" placeholder="name@example.com">
      </div>

      <div class="input-group">
        <label class="input-label" for="registerPassword">Password</label>
        <input class="input-field" id="registerPassword" type="password" placeholder="••••••••">
      </div>

      <button class="btn btn-success w-full mt-2" onclick="register()" style="height: 2.75rem; font-size: 0.9375rem;">
        <span id="regText">Sign Up</span>
        <span id="regLoader" class="loader" style="display: none; width: 1.25rem; height: 1.25rem;"></span>
      </button>

      <div class="auth-toggle mt-6">
        Already have an account? <a onclick="toggleForms()"
          class="text-success hover:text-green-500 transition-colors pointer">Sign in</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js?v=4"></script>

  <script>
    // Overriding original basic alert implementations in auth.js with simple UI loading if needed,
    // but relying on auth.js login/register core calls to maintain backend purity.

    function toggleForms() {
      const loginForm = document.getElementById('loginForm');
      const regForm = document.getElementById('registerForm');

      if (loginForm.style.display === 'none') {
        loginForm.style.display = 'block';
        regForm.style.display = 'none';
      } else {
        loginForm.style.display = 'none';
        regForm.style.display = 'block';
      }
    }

    function googleLogin() {
      window.location.href = "/api/auth/google";
    }
  </script>

</body>

</html>
