<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transactions - Finova</title>
  <link rel="stylesheet" href="style.css">
  <script src="js/theme.js"></script>
</head>

<body>

  <div class="dashboard-layout" id="app-layout">

    <div class="flex flex-col lg:flex-row gap-6">

      <!-- ADD TRANSACTION FORM -->
      <div class="card glass" style="flex: 1; height: fit-content;">
        <div class="card-header">
          <h3 class="card-title">Add Transaction</h3>
        </div>

        <div class="input-group">
          <label class="input-label" for="typeSelect">Type</label>
          <select class="input-field" id="typeSelect">
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
        </div>

        <div class="input-group">
          <label class="input-label" for="categorySelect">Category</label>
          <select class="input-field" id="categorySelect"></select>
        </div>

        <div class="input-group">
          <label class="input-label" for="amountInput">Amount</label>
          <input class="input-field" type="number" id="amountInput" placeholder="e.g. 500.00" />
        </div>

        <div class="input-group">
          <label class="input-label" for="dateInput">Date</label>
          <input class="input-field" type="date" id="dateInput" />
        </div>

        <div class="input-group">
          <label class="input-label" for="descInput">Description</label>
          <input class="input-field" type="text" id="descInput" placeholder="What was this for?" />
        </div>

        <button class="btn btn-primary w-full mt-4" style="width: 100%;" onclick="addTransaction()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Save Transaction
        </button>
      </div>

      <!-- TRANSACTION HISTORY TABLE -->
      <div class="card glass" style="flex: 2;">
        <div
          class="card-header mb-4 pb-4 border-b border-border-color flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
          <h3 class="card-title m-0">Recent History</h3>
          <div class="flex flex-wrap gap-2 w-full sm:w-auto">
            <input type="text" id="searchTx" placeholder="Search description..." class="input-field"
              style="max-width: 200px; padding: 0.5rem;" oninput="applyFilters()" />
            <select id="filterType" class="input-field" style="max-width: 140px; padding: 0.5rem;"
              onchange="applyFilters()">
              <option value="all">All Types</option>
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
            <select id="sortTx" class="input-field" style="max-width: 160px; padding: 0.5rem;"
              onchange="applyFilters()">
              <option value="date_desc">Newest First</option>
              <option value="date_asc">Oldest First</option>
              <option value="amount_desc">Highest Amount</option>
              <option value="amount_asc">Lowest Amount</option>
            </select>
          </div>
        </div>

        <div class="table-container">
          <div id="transactionsList">
            <!-- Populated by transactions.js -->
          </div>
        </div>
      </div>

    </div>

  </div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/transactions.js"></script>
  <script src="js/components/Layout.js"></script>
  <script>
    Layout.init('transactions', 'Transactions');

    // Quick override to layout the transactions.js innerHTML properly into our table design
    // The original script uses simple divs or basic table. We intercept it if we want it stylized perfectly.
  </script>

  <style>
    /* Intercept the basic table output from transactions.js to fit our CSS architecture */
    #transactionsList table {
      width: 100%;
      text-align: left;
      border-collapse: collapse;
    }

    #transactionsList th {
      background-color: var(--bg-tertiary);
      padding: 1rem;
      color: var(--text-secondary);
      font-size: 0.875rem;
      border-bottom: 1px solid var(--border-color);
    }

    #transactionsList td {
      padding: 1rem;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.875rem;
      color: var(--text-primary);
    }

    #transactionsList tr:last-child td {
      border-bottom: none;
    }

    #transactionsList tr:hover td {
      background-color: var(--bg-tertiary);
    }

    #transactionsList td button {
      background: var(--danger-bg);
      color: var(--danger);
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      border: none;
      font-size: 0.75rem;
      cursor: pointer;
      transition: 0.2s;
    }

    #transactionsList td button:hover {
      background: var(--danger);
      color: white;
    }
  </style>

</body>

</html>
