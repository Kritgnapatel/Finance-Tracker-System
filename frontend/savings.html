<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savings Goals - FiscalFlow</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/theme.js"></script>
</head>

<body>

    <div class="dashboard-layout" id="app-layout">

        <div class="flex flex-col lg:flex-row gap-6">

            <!-- ADD GOAL FORM -->
            <div class="card glass" style="flex: 1; height: fit-content;">
                <div class="card-header">
                    <h3 class="card-title">Create New Goal</h3>
                </div>

                <div class="input-group">
                    <label class="input-label" for="goalTitle">Goal Title</label>
                    <input class="input-field" type="text" id="goalTitle" placeholder="e.g. Vacation, New Car" />
                </div>

                <div class="input-group">
                    <label class="input-label" for="goalTarget">Target Amount</label>
                    <input class="input-field" type="number" id="goalTarget" placeholder="e.g. 50000" />
                </div>

                <div class="input-group">
                    <label class="input-label" for="goalCurrent">Initial Saved Amount (Optional)</label>
                    <input class="input-field" type="number" id="goalCurrent" placeholder="e.g. 1000" value="0" />
                </div>

                <div class="input-group">
                    <label class="input-label" for="goalDeadline">Target Deadline (Optional)</label>
                    <input class="input-field" type="date" id="goalDeadline" />
                </div>

                <div class="input-group">
                    <label class="input-label" for="goalColor">Theme Color</label>
                    <input class="input-field" type="color" id="goalColor" value="#3b82f6"
                        style="padding: 0.25rem; height: 3rem; cursor: pointer;" />
                </div>

                <button class="btn btn-primary w-full mt-4" style="width: 100%;" onclick="addSavingsGoal()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                    </svg>
                    Create Goal
                </button>
            </div>

            <!-- SAVINGS GOALS LIST -->
            <div class="card glass" style="flex: 2; height: fit-content;">
                <div class="card-header border-b border-border-color pb-4 mb-4">
                    <h3 class="card-title">My Saving Targets</h3>
                </div>

                <div id="savingsList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Populated by savings.js -->
                    <p class="text-muted text-sm col-span-full text-center py-8">Loading savings goals...</p>
                </div>
            </div>

        </div>

    </div>

    <!-- ADD FUNDS MODAL -->
    <div id="addFundsModal" class="modal-overlay"
        style="display: none; align-items: center; justify-content: center; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100;">
        <div class="card bg-bg-primary max-w-sm w-full relative" style="box-shadow: var(--shadow-xl);">
            <button class="absolute top-4 right-4 text-secondary hover:text-primary"
                onclick="closeFundsModal()">✕</button>
            <h3 class="text-lg font-bold mb-4">Update Saved Amount</h3>
            <p class="text-sm text-secondary mb-4">Goal: <span id="modalGoalTitle"
                    class="font-medium text-text-primary"></span></p>

            <input type="hidden" id="modalGoalId" />
            <input type="hidden" id="modalCurrentAmount" />

            <div class="input-group">
                <label class="input-label" for="modalAddAmount">Amount to add (or subtract if negative)</label>
                <input class="input-field" type="number" id="modalAddAmount" placeholder="e.g. 500" />
            </div>

            <button class="btn btn-success w-full mt-2" onclick="saveAddedFunds()">Update Progress</button>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/savings.js"></script>
    <script src="js/components/Layout.js"></script>
    <script>
        if (!localStorage.getItem("token")) window.location.href = "/";
        Layout.init('savings', 'Savings Goals');
    </script>

</body>

</html>
